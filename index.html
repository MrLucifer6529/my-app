<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Our Story · For Sherry 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#a96eff;--max:660px;--nav-h:76px}
html,body{width:100%;height:100%;font-family:'Nunito',sans-serif;background:#0d0d1a;overflow:hidden;color:#fff;-webkit-font-smoothing:antialiased}
body{padding:16px 16px calc(16px + env(safe-area-inset-bottom))}
#bg{position:fixed;inset:0;transition:background 1.4s ease;z-index:0;background:linear-gradient(135deg,#0d0d1a,#1a1040)}

/* INTRO */
#intro{position:fixed;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;transition:opacity .6s ease;padding:0 clamp(20px,6vw,40px);text-align:center}
#intro.fade{opacity:0;pointer-events:none}
.intro-heart{font-size:clamp(80px,18vw,110px);animation:iHeart 2s ease forwards}
@keyframes iHeart{0%{opacity:0;transform:scale(0) rotate(-20deg)}60%{opacity:1;transform:scale(1.15) rotate(5deg)}80%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
.intro-text{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1rem,3vw,1.4rem);color:rgba(255,255,255,.5);opacity:0;animation:iFade 1s ease .8s forwards;letter-spacing:1px}
@keyframes iFade{to{opacity:1}}

/* STARS */
.star{position:fixed;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;z-index:1;pointer-events:none}
@keyframes twinkle{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:.8;transform:scale(1.7)}}

/* THEME EMOJI RAIN */
.temoji{position:fixed;top:-40px;z-index:4;pointer-events:none;opacity:0;animation:emojifall linear infinite;line-height:1;user-select:none}
@keyframes emojifall{0%{opacity:0;transform:translateY(0) translateX(0) rotate(0deg)}8%{opacity:.88}50%{transform:translateY(52vh) translateX(18px) rotate(180deg)}92%{opacity:.62}100%{opacity:0;transform:translateY(112vh) translateX(-12px) rotate(360deg)}}

/* FINALE FIREWORKS */
#fireworks{position:fixed;inset:0;z-index:8;pointer-events:none;overflow:hidden}
.fwburst{position:absolute;left:0;top:0;width:0;height:0}
.fwpart{
  position:absolute;left:0;top:0;border-radius:50%;
  opacity:0;transform:translate(-50%,-50%) scale(.35);
  animation:fwpop .95s cubic-bezier(.16,.7,.28,1) forwards;
  box-shadow:0 0 8px currentColor;
}
@keyframes fwpop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}
  12%{opacity:1}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1)}
}

/* BG CATS */
.fcat{position:fixed;z-index:3;pointer-events:none;opacity:.34;will-change:transform;transform:translate3d(0,0,0)}
.fcat{left:0;top:0}
.fcat img{display:block;border-radius:8px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.5));width:46px;height:46px}

/* CONTEXT CAT */
#ctxcat{position:fixed;bottom:18px;right:18px;z-index:170;pointer-events:none;opacity:0;transform:translateY(20px) scale(.85);transition:opacity .5s,transform .5s;touch-action:none;cursor:grab}
#ctxcat.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
#ctxcat.dragging{cursor:grabbing;transform:translateY(0) scale(1.06)}
#ctxcat img{width:60px;height:60px;border-radius:14px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.6));animation:ctxbounce 2.2s ease-in-out infinite}
@keyframes ctxbounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}

/* FLASH */
#flash{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;background:radial-gradient(circle at center,rgba(255,110,199,.25),transparent 70%);transition:opacity .12s ease}
#flash.pop{opacity:1}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff6ec7,#a96eff);color:#fff;padding:10px 24px;border-radius:50px;font-size:.8rem;font-weight:800;letter-spacing:.5px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:400;white-space:nowrap;box-shadow:0 4px 20px rgba(169,110,255,.5)}
#toast.show{opacity:1}

/* DRAGGABLE MUSIC BTN */
#musicbtn{
  position:fixed;bottom:18px;left:18px;
  z-index:160;width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  cursor:grab;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:background .22s, box-shadow .22s;
  touch-action:none;user-select:none;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
#musicbtn:hover{background:rgba(255,255,255,.18);box-shadow:0 4px 18px rgba(169,110,255,.4)}
#musicbtn.dragging{cursor:grabbing;box-shadow:0 8px 28px rgba(169,110,255,.7);transform:scale(1.12)}
#musicbtn.playing{background:rgba(169,110,255,.25);border-color:rgba(169,110,255,.5)}

/* PROGRESS */
#pbar{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.07);z-index:200}
#pfill{height:100%;background:linear-gradient(90deg,#ff6ec7,#ffe06e,#a96eff,#ff6ec7);background-size:200%;animation:pshift 4s linear infinite;transition:width .8s ease;border-radius:0 4px 4px 0;box-shadow:0 0 12px rgba(255,110,199,.6)}
@keyframes pshift{0%{background-position:0%}100%{background-position:200%}}
#clabel{position:fixed;top:13px;left:50%;transform:translateX(-50%);font-size:.58rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.27);z-index:200;white-space:nowrap;pointer-events:none;max-width:85vw;overflow:hidden;text-overflow:ellipsis}
#dots{position:fixed;top:27px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:200;align-items:center;pointer-events:none}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .4s}
.dot.done{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.dot.active{background:#fff;transform:scale(1.45);box-shadow:0 0 12px rgba(255,255,255,.7)}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s;pointer-events:none;z-index:10}
.screen.active{opacity:1;transform:translateY(0);pointer-events:all}

/* TITLE */
#ts{justify-content:center;gap:12px;text-align:center;padding:24px clamp(20px, 6vw, 40px)}
.t-icon{font-size:clamp(60px,12vw,82px);animation:bounce 2.2s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(255,100,200,.75))}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.t-head{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(2rem,8vw,4rem);line-height:1.15;background:linear-gradient(90deg,#ff6ec7,#ffe06e,#a96eff,#6ef0ff,#ff6ec7);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rbow 4s linear infinite;cursor:pointer;user-select:none}
@keyframes rbow{0%{background-position:0%}100%{background-position:300%}}
.t-ded{font-size:clamp(.9rem,2.5vw,1.08rem);color:rgba(255,255,255,.72);line-height:2;letter-spacing:.3px}
.t-hearts{display:flex;align-items:center;justify-content:center;gap:clamp(6px,2vw,14px);font-size:clamp(1.2rem,4vw,1.6rem);animation:hpulse 2.5s ease-in-out infinite}
@keyframes hpulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.t-meta{font-size:clamp(.62rem,1.5vw,.72rem);color:rgba(255,255,255,.22);letter-spacing:2px;text-transform:uppercase}
.t-hint{font-size:.6rem;color:rgba(255,255,255,.14);letter-spacing:1px}
#continuebtn{display:none;padding:9px 24px;background:rgba(169,110,255,.2);color:rgba(255,255,255,.7);border:1px solid rgba(169,110,255,.4);border-radius:50px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;transition:all .2s}
#continuebtn:hover{background:rgba(169,110,255,.35);color:#fff}

/* CHAPTER */
#cs{justify-content:flex-start;padding-top:50px}
.ch-scroll{width:100%;max-width:var(--max);margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;overflow-y:auto;height:calc(100dvh - 50px);padding:10px clamp(20px,6vw,40px) 24px;scrollbar-width:none;overscroll-behavior:contain}
.ch-scroll::-webkit-scrollbar{display:none}
.ch-icon{font-size:clamp(48px,10vw,62px);filter:drop-shadow(0 0 20px rgba(255,255,255,.18));animation:popin .55s cubic-bezier(.175,.885,.32,1.275) both;flex-shrink:0}
@keyframes popin{from{transform:scale(0) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.ch-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.25rem,4.5vw,2.05rem);font-weight:700;color:var(--accent);line-height:1.25;text-shadow:0 0 28px color-mix(in srgb,var(--accent) 50%,transparent);padding:0 4px}
.ch-sub{font-size:clamp(.6rem,1.6vw,.68rem);font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.24);padding:0 8px}
.narrative{
  font-size:clamp(.88rem,2.3vw,1.04rem);line-height:2.1;color:rgba(255,255,255,.88);
  text-align:left;white-space:pre-wrap;width:100%;padding:16px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.28);margin-bottom:10px
}
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:text-bottom;margin-left:1px;animation:blink .75s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* FINALE */
#fs{justify-content:flex-start;padding-top:50px;align-items:center}
.f-scroll{width:100%;max-width:var(--max);margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;overflow-y:auto;max-height:100dvh;padding:clamp(42px,7vw,60px) clamp(20px,6vw,40px) 24px;scrollbar-width:none;overscroll-behavior:contain}
.f-scroll::-webkit-scrollbar{display:none}
.f-icon{font-size:clamp(60px,12vw,76px);animation:bounce 2s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(255,200,50,.55));flex-shrink:0}
.f-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.5rem,5.5vw,2.7rem);font-weight:700;line-height:1.2;background:linear-gradient(90deg,#ff6ec7,#ffe06e,#a96eff,#6ef0ff);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rbow 3.5s linear infinite}
.f-hearts{display:flex;align-items:center;justify-content:center;gap:clamp(6px,2vw,12px);font-size:clamp(1.2rem,4vw,1.5rem);animation:hpulse 2s ease-in-out infinite}
.f-msg{
  font-size:clamp(.88rem,2.3vw,1.04rem);color:rgba(255,255,255,.87);line-height:2.1;
  text-align:left;white-space:pre-wrap;width:100%;padding:16px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.28);margin-bottom:10px
}
.f-sign{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.95rem,2.5vw,1.18rem);color:#ffe06e;text-align:right;width:100%;opacity:.88}
.rbtn{padding:12px 32px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;font-size:clamp(.78rem,2vw,.85rem);font-weight:700;border:1px solid rgba(255,255,255,.13);border-radius:50px;cursor:pointer;transition:all .22s;margin-top:2px}
.rbtn:hover{background:rgba(255,255,255,.14);transform:translateY(-2px);color:rgba(255,255,255,.82)}

/* NAV */
#nav{position:relative;display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 0;background:transparent;border:none;box-shadow:none;z-index:20;width:100%;max-width:var(--max);margin:0 auto}
.nbtn{padding:clamp(10px,2vw,13px) clamp(22px,5vw,32px);font-size:clamp(.85rem,2.2vw,.93rem);font-weight:800;font-family:'Nunito',sans-serif;border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s;letter-spacing:.4px;white-space:nowrap}
.nbtn:hover{transform:translateY(-3px)}
.nbtn:active{transform:scale(.97)}
#bprev{background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.13)}
#bprev:hover{background:rgba(255,255,255,.15)}
#bnext{background:linear-gradient(135deg,#ff6ec7,#a96eff);color:#fff;box-shadow:0 4px 22px rgba(169,110,255,.5);min-width:clamp(130px,35vw,158px)}
#bnext:hover{box-shadow:0 8px 32px rgba(169,110,255,.88)}
#bnext.skip{background:linear-gradient(135deg,#a96eff,#6ef0ff)}
.nav-slot{width:100%;display:flex;justify-content:center}
@media(min-width:700px){:root{--max:680px;--nav-h:80px}.fcat img{width:56px;height:56px}#ctxcat img{width:74px;height:74px}}
@media(max-width:460px){.t-hearts{gap:5px;font-size:1.1rem}}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="fireworks" aria-hidden="true"></div>

<div id="intro">
  <div class="intro-heart">💜</div>
  <div class="intro-text">A story written just for you...</div>
</div>

<div id="flash"></div>
<div id="toast"></div>
<button id="musicbtn" title="Drag me anywhere · Click to toggle music">🎵</button>

<div id="ctxcat" title="Drag me · Tap me for squish">
  <img id="ctxcatimg" src="" alt="" onerror="this.parentElement.style.display='none'">
</div>
<div id="fcatlayer"></div>

<div id="pbar"><div id="pfill" style="width:0%"></div></div>
<div id="clabel"></div>
<div id="dots"></div>

<!-- TITLE -->
<div class="screen active" id="ts">
  <div class="t-icon">🌹</div>
  <div class="t-head" id="tHead">Our Story</div>
  <p class="t-ded">To my love of life, <strong>Sherry</strong><br>From the one who is forever and utterly yours</p>
  <div class="t-hearts"><span>🌹</span><span>🩵</span><span>💜</span><span>🌸</span><span>💋</span></div>
  <p class="t-meta">10 Chapters &nbsp;·&nbsp; From Teyvat to The Overworld</p>
  <p class="t-hint">✨ drag the side cat around and tap it for squish</p>
  <button id="continuebtn"></button>
  <div class="nav-slot" id="navslot-ts"></div>
</div>

<!-- CHAPTER -->
<div class="screen" id="cs">
  <div class="ch-scroll" id="chscroll">
    <div class="ch-icon"   id="cicon"></div>
    <div class="ch-title"  id="ctitle"></div>
    <div class="ch-sub"    id="csub"></div>
    <div class="narrative" id="cnarr"></div>
    <div class="nav-slot" id="navslot-cs"></div>
  </div>
</div>

<!-- FINALE -->
<div class="screen" id="fs">
  <div class="f-scroll" id="fscroll">
    <div class="f-icon">🎂</div>
    <div class="f-title">Happy Birthday, Meri Jaan 💜</div>
    <div class="f-hearts"><span>🌹</span><span>🩵</span><span>💜</span><span>🌸</span><span>💖</span><span>🍒</span></div>

    <div class="f-msg"  id="fmsg"></div>
    <div class="f-sign" id="fsign"></div>
    <div class="nav-slot" id="navslot-fs"></div>
    <button class="rbtn" id="startbtn" onclick="goTo(0)">Go To Start &nbsp;🏠</button>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="nbtn" id="bprev" onclick="prev()" style="display:none">Back</button>
  <button class="nbtn" id="bnext" onclick="next()">Start Our Story &nbsp;🌸</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CAT GIFS
// ═══════════════════════════════════════════════════════
const CATS={
  excited:'https://media.tenor.com/0UPw9RZF_cAAAAAj/pop-cat.gif',
  happy  :'https://media.tenor.com/CnP64S7lszwAAAAj/meme-cat-cat-meme.gif',
  chaotic:'https://media.tenor.com/xXNzEkd7BYYAAAAi/yapapa-cat.gif',
  nyan:'https://media.tenor.com/2roX3uxz_68AAAAC/nyan-cat.gif',
  keyboard:'https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif',
  grumpy:'https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif',
  typing:'https://media.giphy.com/media/13CoXDiaCcCoyk/giphy.gif',
};
const FLY_GIFS=[
  CATS.happy,CATS.chaotic,CATS.excited,CATS.nyan
];

const THEMES=[
  ['💜','🌹','🌸','✨','💫','🎮'],
  ['🎮','⚔️','✨','🌟','💫','🌬️'],
  ['📱','💬','💫','🌸','✉️','🧭'],
  ['⚔️','💢','🌊','💫','🔥','🗺️'],
  ['💋','💜','🫧','🌸','💓','🎵'],
  ['🌙','✨','🌟','💫','🌌','🎮'],
  ['🌩️','💫','🌊','🔥','⚡','⛏️'],
  ['🎉','🎊','✨','💜','🥂','🧱'],
  ['💥','⚡','🔥','💢','💫','🟩'],
  ['🫀','🌸','💜','🌹','🤍','💎'],
  ['🌸','🌹','💐','🍒','💋','🏠'],
  ['🎂','🎉','💜','🌹','✨','🩵','🎮','⛏️'],
];

const CH=[
{label:'Chapter 1  ·  How It All Started',title:'It Started in Teyvat',sub:'🎮  The afternoon that changed everything  🎮',icon:'🎮',accent:'#4fc3f7',bg:['#071525','#0d2d48'],cat:CATS.excited,
text:`You were in Mondstadt that afternoon.

Just a girl figuring out a new game, wandering through a world she had barely started to understand. Completely unaware of what was about to walk into her life.

And then I joined your world.

Out of nowhere. No plan. No reason. Just a random stranger showing up uninvited and acting like he belonged there.

You probably thought nothing of it.

But something in that moment quietly decided our entire future without asking either of us.

That afternoon in Teyvat was the very first page of the most beautiful story I have ever been part of. And I did not even know I was stepping into it.

I just joined your world.

And somehow, I never left.`},
{label:'Chapter 2  ·  The Spark',title:'Reels, Replies and Then You',sub:'📱  Finding reasons to stay  📱',icon:'📱',accent:'#ce93d8',bg:['#1a0a2e','#2a123d'],cat:CATS.happy,
text:`Then you started sending me reels.

And we both know what sending someone reels actually means. It is not random. It is finding a reason to stay in someone's notifications without making it too obvious.

I replied. You replied. And then something shifted between us.

What started as funny videos slowly became real conversations. Late nights. Thoughts that had nowhere else to go. The kind of talking where you look up and hours have just disappeared into nothing.

I started waiting for your name to appear.

I started saving things throughout my day just to send them to you. Little things that had no reason to remind me of you but did anyway.

We were two strangers who were quickly running out of ways to pretend that we were just strangers.

Neither of us wanted to stop.

And I am so endlessly glad we did not.`},
{label:'Chapter 3  ·  The Enemies to Lovers Arc',title:'You Hated Me and Fell Harder Every Time',sub:'🌹  You hated me but fell deeper every single time  🌹',icon:'⚔️',accent:'#80cbc4',bg:['#071a1a','#0d2d2d'],cat:CATS.chaotic,
text:`We were supposed to be enemies, weren't we.

There was friction between us. Arguments. Moments where you looked at me like you could not stand me. You pushed. I pushed back every single time.

I saw the walls you had built around yourself and I did not let them stand. I gave you reality checks. I challenged things. Not to win and not to hurt you. Because I actually saw something in you underneath all the defense and I cared about it more than I was willing to admit yet.

And here is the thing, meri jaan.

Every time you made yourself hate me more, you fell deeper. Every argument. Every fire in your eyes. Every moment you fought me like you meant it.

You were falling for me while trying so hard not to.

You fell in love while pretending you had not. You fell before you had permission to. You fell the way you fall asleep. Slowly and then all at once.

Every tear from those battles only pulled you closer to me. And I was falling just as hard in the opposite direction, right toward you.

We were utterly each other's before either of us admitted it.`},
{label:'Chapter 4  ·  The Confession',title:'You Made Me Surrender',sub:'💋  The most honest messy beautiful moment  💋',icon:'💬',accent:'#f48fb1',bg:['#1f0a1a','#300f25'],cat:CATS.keyboard,
text:`You were scared I would leave.

You had been let down before. And I could feel that fear living underneath every argument, every hard word, every moment you pushed me away with both hands while everything in your eyes was begging me to stay.

So we fought. The kind of fight that only happens when two people love each other too much and are too afraid to just say it.

There was heat. There were too many words. There was everything we had been holding back for too long finally breaking through the surface.

And then right in the middle of all of it, you made me surrender.

Because somewhere in that moment you finally understood something.

I was not going to leave.

No matter how hard you pushed. No matter how many times you tested it. No matter how many walls you put up or fires you started. I was not going anywhere.

And when that finally landed inside you, when you finally believed it for real, something broke open in you that had been locked for a very long time.

Tears fell from your eyes.

Not from pain. Not from the fight. But from the relief of it. After years of holding everything so tightly, after years of expecting everyone to eventually disappear, after years of guarding yourself from exactly this kind of love...

For the first time in years, tears fell.

And I held you through every single one of them.

Meri jaan. I meant every word. I still do. I always will.`},
{label:'Chapter 5  ·  The Most Sacred Night',title:'The Moment That Built Us',sub:'🌙  The night that split everything into before and after  🌙',icon:'🌙',accent:'#b39ddb',bg:['#120a2e','#1a1040'],cat:CATS.grumpy,
text:`There are moments that split a life into before and after.

{label:'Chapter 6  ·  The Storm',title:'They Tried. We Stayed.',sub:'🌩️  The whole world came for us  🌩️',icon:'🌩️',accent:'#ef9a9a',bg:['#1a0808','#2e0f0f'],cat:CATS.typing,
text:`Then the storm arrived.

Your brother found out. Your siblings came at us hard. Everything we had quietly built together suddenly had the whole world trying to dismantle it from every side.

There were nights it genuinely felt like the end. Nights where the weight of it was so heavy I did not know if we were strong enough for this.

And then I did something that most people would never do.

I spoke to your sisters.

My Urdu was not good enough. My English kept breaking apart in the middle of sentences. I could not find the right words in either language to say what I needed to say. But I did not let that stop me.

Because what I had in my heart was bigger than language.

I sat with them and I told them the truth. Broken words, wrong grammar, a boy who could barely string two proper sentences together in the language they spoke. But every single thing I said came from a place so real and so certain that I think they could feel it even through all my stumbling.

I told them I love you. Not to impress anyone. Not to perform something. Because it was simply true and they deserved to hear it from me directly, face to face, with whatever words I had available.

Most people never do that. Most people run when things get hard. I walked toward it.

Because you are worth walking toward. You have always been worth it.

We held on. Not because it was easy. Because you were worth every single storm.

They tried.

We are still here. Still us. Still choosing each other.`},
{label:'Chapter 7  ·  One Year and Beyond',title:'Still Here. Still Us.',sub:'🎉  One year of choosing each other  🎉',icon:'🎉',accent:'#ffe06e',bg:['#1a1500','#2e2200'],cat:CATS.nyan,
text:`They thought it was the end.

I know the answer to every question I ever had about love. And the answer is you.

{label:'Chapter 8  ·  World War 3 and Making Up',title:'We Fight Like the World is Ending',sub:'💥  And come back closer every single time  💥',icon:'💥',accent:'#ffab91',bg:['#1a0f0a','#2e1a10'],cat:CATS.grumpy,
text:`Okay let me be completely honest with you.

{label:'Chapter 9  ·  A Part of Me',title:'You Are Home',sub:'🫀  My person. My shore. My everything.  🫀',icon:'🫀',accent:'#f48fb1',bg:['#1f0a18','#2e1022'],cat:CATS.typing,
text:`You have become a part of me I do not know how to exist without.

(function(){
  const btn=document.getElementById('musicbtn');
  let dragging=false,startX,startY,origLeft,origTop;

  function getPos(){
    const r=btn.getBoundingClientRect();
    return{left:r.left,top:r.top};
  }

  function onDown(e){
    e.preventDefault();
    dragging=false;
    const pos=getPos();
    origLeft=pos.left;origTop=pos.top;
    const pt=e.touches?e.touches[0]:e;
    startX=pt.clientX;startY=pt.clientY;
    btn.style.transition='none';
    btn.style.left=origLeft+'px';btn.style.top=origTop+'px';
    btn.style.bottom='auto';btn.style.right='auto';
    document.addEventListener('pointermove',onMove);
    document.addEventListener('pointerup',onUp);
  }

  function onMove(e){
    const pt=e.touches?e.touches[0]:e;
    const dx=pt.clientX-startX,dy=pt.clientY-startY;
    if(!dragging&&Math.hypot(dx,dy)>5){dragging=true;btn.classList.add('dragging');}
    if(!dragging)return;
    const nLeft=Math.max(0,Math.min(origLeft+dx,window.innerWidth-btn.offsetWidth));
    const nTop=Math.max(0,Math.min(origTop+dy,window.innerHeight-btn.offsetHeight));
    btn.style.left=nLeft+'px';btn.style.top=nTop+'px';
  }

  function onUp(){
    btn.classList.remove('dragging');
    btn.style.transition='';
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
    if(!dragging)toggleMusic();
    dragging=false;
  }

  btn.addEventListener('pointerdown',onDown);
})();

function playSquishSound(){

    if(squishCtx.state==='suspended')squishCtx.resume();
    const t=squishCtx.currentTime;

    const plop=(start,f1,f2,peak,dur)=>{
      const o=squishCtx.createOscillator();
      const g=squishCtx.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(f1,start);
      o.frequency.exponentialRampToValueAtTime(f2,start+dur);
      g.gain.setValueAtTime(.0001,start);
      g.gain.exponentialRampToValueAtTime(peak,start+.008);
      g.gain.exponentialRampToValueAtTime(.0001,start+dur);
      o.connect(g);g.connect(squishCtx.destination);
      o.start(start);o.stop(start+dur+.01);
    };
    plop(t,540,88,.28,.21);
    plop(t+.04,300,66,.15,.19);

    const low=squishCtx.createOscillator();
    const lowGain=squishCtx.createGain();
    low.type='sine';
    low.frequency.setValueAtTime(105,t+.01);
    low.frequency.exponentialRampToValueAtTime(42,t+.24);
    lowGain.gain.setValueAtTime(.0001,t+.01);
    lowGain.gain.exponentialRampToValueAtTime(.16,t+.026);
    lowGain.gain.exponentialRampToValueAtTime(.0001,t+.25);
    low.connect(lowGain);lowGain.connect(squishCtx.destination);
    low.start(t+.01);low.stop(t+.26);

    const b=squishCtx.createBuffer(1,Math.floor(squishCtx.sampleRate*.14),squishCtx.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.75;
    const n=squishCtx.createBufferSource();n.buffer=b;
    const bp=squishCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.setValueAtTime(620,t);bp.Q.value=.95;
    const ng=squishCtx.createGain();ng.gain.setValueAtTime(.0001,t);ng.gain.exponentialRampToValueAtTime(.07,t+.009);ng.gain.exponentialRampToValueAtTime(.0001,t+.13);
    n.connect(bp);bp.connect(ng);ng.connect(squishCtx.destination);
    n.start(t);n.stop(t+.13);
  }catch(_){}

function initWanderingCats(){
  if(REDUCED_MOTION)return;
  const pool=FLY_GIFS.length?FLY_GIFS:[CATS.happy,CATS.chaotic,CATS.excited];
  const movers=[];
  const count=LOW_POWER?(window.innerWidth<700?2:3):(window.innerWidth<700?3:4);

  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='fcat';
    const img=document.createElement('img');
    img.src=pool[i%pool.length];
    img.alt='';
    img.onerror=function(){this.parentElement.style.display='none';};
    el.appendChild(img);
    ($fcatlayer||document.body).appendChild(el);

    const w=window.innerWidth>=700?56:46;
    const x=Math.random()*(window.innerWidth-w);
    const y=Math.random()*(window.innerHeight-w);
    const ang=Math.random()*Math.PI*2;
    const speed=(LOW_POWER?20:26)+Math.random()*10;
    movers.push({
      el,x,y,
      vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,
      speed,turn:LOW_POWER?2.6:3.2,
      tx:Math.random()*window.innerWidth,
      ty:Math.random()*window.innerHeight
    });
  }

  const retarget=(m,maxX,maxY)=>{
    m.tx=Math.random()*maxX;
    m.ty=Math.random()*maxY;
  };
  movers.forEach(m=>retarget(m,Math.max(0,window.innerWidth-(m.el.offsetWidth||46)),Math.max(0,window.innerHeight-(m.el.offsetHeight||46))));

  let last=performance.now();
  const tick=(now)=>{
    if(document.hidden){last=now;requestAnimationFrame(tick);return;}
    const dt=Math.min(32,now-last)/1000;
    last=now;
    movers.forEach(m=>{
      const w=m.el.offsetWidth||46,h=m.el.offsetHeight||46;
      const maxX=Math.max(0,window.innerWidth-w),maxY=Math.max(0,window.innerHeight-h);

      const toX=m.tx-m.x,toY=m.ty-m.y;
      const dist=Math.hypot(toX,toY)||.001;
      if(dist<24||(Math.random()<.0015&&!LOW_POWER))retarget(m,maxX,maxY);

      const desiredX=(m.tx-m.x)/(Math.hypot(m.tx-m.x,m.ty-m.y)||1);
      const desiredY=(m.ty-m.y)/(Math.hypot(m.tx-m.x,m.ty-m.y)||1);
      const steer=Math.min(1,m.turn*dt);
      m.vx+=(desiredX*m.speed-m.vx)*steer;
      m.vy+=(desiredY*m.speed-m.vy)*steer;

      m.x+=m.vx*dt;
      m.y+=m.vy*dt;

      if(m.x<0){m.x=0;m.vx=Math.abs(m.vx);retarget(m,maxX,maxY);}
      if(m.x>maxX){m.x=maxX;m.vx=-Math.abs(m.vx);retarget(m,maxX,maxY);}
      if(m.y<0){m.y=0;m.vy=Math.abs(m.vy);retarget(m,maxX,maxY);}
      if(m.y>maxY){m.y=maxY;m.vy=-Math.abs(m.vy);retarget(m,maxX,maxY);}

      m.el.style.transform=`translate3d(${m.x}px,${m.y}px,0)`;
    });
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

  g.gain.setValueAtTime(.0001,now);
  g.gain.exponentialRampToValueAtTime(.15,now+.01);
  g.gain.exponentialRampToValueAtTime(.0001,now+life);
  o1.connect(lp);o2.connect(lp);o3.connect(lp);lp.connect(g);g.connect(mGain);
  o1.start(now);o2.start(now);o3.start(now);

  const b=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*.04),audioCtx.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.6;
  const src=audioCtx.createBufferSource();src.buffer=b;
  const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1500;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(.0001,t);
  g.gain.exponentialRampToValueAtTime(.03,t+.005);
  g.gain.exponentialRampToValueAtTime(.0001,t+.035);
  src.connect(hp);hp.connect(g);g.connect(mGain);
  src.start(t);src.stop(t+.04);
}
function runMelody(){
  if(!mPlaying||!audioCtx)return;
  const [note,beats]=HAPPY_BDAY[mStep];
  const beatSec=60/136;
  const sec=Math.max(.1,beats*beatSec*(LOW_POWER?1.08:1));
  if(NOTE_HZ[note])playNote(NOTE_HZ[note],sec);
  if(mStep%8===0)playKick();
  else if(!LOW_POWER&&mStep%2===0)playClick();
  mStep=(mStep+1)%HAPPY_BDAY.length;
  mTimer=setTimeout(runMelody,sec*1000);
}
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  mGain=audioCtx.createGain();
  mGain.gain.value=0;
  mGain.connect(audioCtx.destination);
}
function startMusic(){
  if(!audioCtx||!mGain)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(mTimer){clearTimeout(mTimer);mTimer=null;}
  mStep=0;
  mGain.gain.cancelScheduledValues(audioCtx.currentTime);
  mGain.gain.setTargetAtTime(LOW_POWER ? .2 : .23,audioCtx.currentTime,.15);
  runMelody();
}
function stopMusic(){
  if(!audioCtx||!mGain)return;
  if(mTimer){clearTimeout(mTimer);mTimer=null;}
  mGain.gain.cancelScheduledValues(audioCtx.currentTime);
  mGain.gain.setTargetAtTime(0,audioCtx.currentTime,.18);
}
function toggleMusic(){
  initAudio();
  const btn=gi('musicbtn');
  if(!mPlaying){
    mPlaying=true;
    startMusic();
    btn.textContent='🔊';
    btn.classList.add('playing');
    showToast('Birthday music on 🎂');
  }else{
    mPlaying=false;
    stopMusic();
    btn.textContent='🎵';
    btn.classList.remove('playing');
    showToast('Music off');
  }
}
document.addEventListener('visibilitychange',()=>{
  if(!audioCtx||!mPlaying)return;
  if(document.hidden)stopMusic();
  else startMusic();
});

function setScreen(id){['ts','cs','fs'].forEach(s=>gi(s).classList.remove('active'));gi(id).classList.add('active');}
function mountNav(slotId){
  const slot=gi(slotId);
  if(slot&&$nav.parentElement!==slot)slot.appendChild($nav);
}
function syncUI(){
  const pct=state===0?0:state>TOTAL?100:(state/TOTAL)*100;
  $pf.style.width=pct+'%';
  for(let i=0;i<TOTAL;i++){const d=gi('d'+i);if(!d)continue;d.className='dot'+(i<state?' done':'')+(i===state-1?' active':'');}
  $bprev.style.display=state>0?'block':'none';
  $bnext.style.display=state<=TOTAL?'block':'none';
}
function goTo(s){
  state=s;if(tTimer){clearInterval(tTimer);tTimer=null;}
  localStorage.setItem('ourStory_ch',state>TOTAL?0:state);
  if(state===0){
    stopFireworks();
    setScreen('ts');$bg.style.background='linear-gradient(135deg,#0d0d1a,#1a1040)';
    document.documentElement.style.setProperty('--accent','#a96eff');
    $lbl.textContent='';$bnext.textContent='Start Our Story \u00a0🌸';$bnext.classList.remove('skip');
    setCtxCat(null);spawnEmojis(THEMES[0]);mountNav('navslot-ts');
  } else if(state>=1&&state<=TOTAL){
    stopFireworks();
    const ch=CH[state-1];
    document.documentElement.style.setProperty('--accent',ch.accent);
    $bg.style.background=`linear-gradient(135deg,${ch.bg[0]},${ch.bg[1]})`;
    $lbl.textContent=ch.label;
    const ci=gi('cicon');ci.textContent=ch.icon;ci.style.animation='none';void ci.offsetWidth;ci.style.animation='';
    gi('ctitle').textContent=ch.title;gi('csub').textContent=ch.sub;gi('chscroll').scrollTop=0;
    setScreen('cs');setCtxCat(ch.cat);spawnEmojis(THEMES[state]);typeIt(ch.text);mountNav('navslot-cs');
  } else {
    gi('fmsg').textContent=FINALE;gi('fsign').textContent=SIGN;
    $bg.style.background='linear-gradient(135deg,#0d0820,#1a0530)';
    document.documentElement.style.setProperty('--accent','#ff6ec7');
    $lbl.textContent='The End · A New Beginning 🌸';
    gi('fscroll').scrollTop=0;setScreen('fs');setCtxCat(CATS.nyan);spawnEmojis(THEMES[11]);mountNav('navslot-fs');startFireworks();
  }
  syncUI();
}
function typeIt(txt){
  tDone=false;$bnext.textContent='Skip';$bnext.classList.add('skip');
  const el=gi('cnarr');el.innerHTML='<span class="cursor"></span>';let i=0;
  tTimer=setInterval(()=>{
    if(i<txt.length){el.innerHTML=esc(txt.slice(0,++i))+'<span class="cursor"></span>';gi('chscroll').scrollTop=99999;}
    else{clearInterval(tTimer);tTimer=null;tDone=true;el.textContent=txt;$bnext.classList.remove('skip');$bnext.textContent=state>=TOTAL?'The Finale \u00a0🎂':'Next Chapter';}
  },24);
}
function skipType(){if(tTimer){clearInterval(tTimer);tTimer=null;}gi('cnarr').textContent=CH[state-1].text;tDone=true;$bnext.classList.remove('skip');$bnext.textContent=state>=TOTAL?'The Finale \u00a0🎂':'Next Chapter';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function next(){if(state===0){goTo(1);return;}if(state>=1&&state<=TOTAL&&!tDone){skipType();return;}if(!LOW_POWER&&state>=1&&state<TOTAL)doFlash();goTo(state+1);}
function prev(){if(state===0)return;goTo(state>TOTAL?TOTAL:state-1);}

for(let i=0;i<(LOW_POWER?14:26);i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.35;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*8+5}s;animation-delay:${Math.random()*6}s`;document.body.appendChild(s);}

mountNav('navslot-ts');
initCtxCatDrag();
initWanderingCats();
syncUI();spawnEmojis(THEMES[0]);
</script>
